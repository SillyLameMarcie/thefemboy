<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thefemboy.com | lunar portfolio</title>
    <meta name="description" content="Personal portfolio and aesthetic fashion recaps.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2289%22>🖤</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #c98bb9;
            --text-color: #e0e0e0;
            --secondary-text: #888;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(201, 139, 185, 0.05) 0%, transparent 50%);
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header::before { content: '🌙'; font-size: 2.5rem; display: block; margin-bottom: 10px; opacity: 0.8; }

        h1 { font-family: 'Space Mono', monospace; font-size: 2rem; margin: 0; text-transform: lowercase; }
        
        .bio { font-size: 0.9rem; color: var(--secondary-text); margin-top: 10px; letter-spacing: 1px; }

        .container { max-width: 900px; width: 90%; }

        /* Stylizacja Feed-u */
        .instagram-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .post-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .post-card:hover img { filter: grayscale(0%); }

        .post-info { padding: 15px; font-size: 0.85rem; }
        
        .hearts-divider { text-align: center; margin: 40px 0; color: #000; text-shadow: 0 0 5px rgba(255,255,255,0.1); font-size: 1.5rem; }

        footer { padding: 60px; font-size: 0.8rem; color: var(--secondary-text); text-align: center; }

        /* Ładowanie danych */
        #status { text-align: center; color: var(--secondary-text); margin-top: 50px; font-family: 'Space Mono', monospace; }
    </style>
</head>
<body>

    <header>
        <h1>thefemboy.com</h1>
        <div class="bio">Silly guy 🖤 21 🇵🇱/🇮🇹</div>
    </header>

    <div class="container">
        <div id="status">summoning the moon...</div>
        <div class="instagram-grid" id="insta-feed"></div>
        
        <div class="hearts-divider">🖤 🖤 🖤</div>

        <section style="text-align: center; margin-bottom: 50px;">
            <h2 style="font-family: 'Space Mono', monospace; font-size: 1.2rem;">Recaps & Tier Lists</h2>
            <p style="color: var(--secondary-text);">Coming soon to the lunar orbit...</p>
        </section>
    </div>

    <footer>
        &copy; 2026 Crafted in the dark.
    </footer>

    <script>
        const feedUrl = 'https://feeds.behold.so/zab5UpRbHwPLHSN3UfoS';

        async function loadFeed() {
            try {
                const response = await fetch(feedUrl);
                const data = await response.json();
                const feedContainer = document.getElementById('insta-feed');
                const status = document.getElementById('status');

                status.style.display = 'none';

                data.posts.forEach(post => {
                    const postElement = document.createElement('a');
                    postElement.href = post.permalink;
                    postElement.target = '_blank';
                    postElement.className = 'post-card';

                    // Używamy średniej wielkości zdjęcia (medium) dla szybkości ładowania
                    const imageUrl = post.sizes.medium.mediaUrl;
                    const caption = post.prunedCaption || "View on Instagram";

                    postElement.innerHTML = `
                        <img src="${imageUrl}" alt="femboy aesthetic outfit" loading="lazy">
                        <div class="post-info">
                            ${caption.substring(0, 60)}${caption.length > 60 ? '...' : ''}
                        </div>
                    `;
                    feedContainer.appendChild(postElement);
                });
            } catch (error) {
                console.error('Error fetching feed:', error);
                document.getElementById('status').innerText = 'The moon is hidden behind clouds. Try again later.';
            }
        }

        loadFeed();
    </script>
</body>
</html>
